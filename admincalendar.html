<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Calendar</title>

<style>
body {
  font-family: system-ui, sans-serif;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.box {
  max-width:750px;
  margin:0 auto 2rem;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#166534;
}

.event {
  display:flex;
  justify-content:space-between;
  padding:0.5rem 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

small { color:#6b7280; }

.delBtn {
  width:auto;
  background:#b91c1c;
  padding:0.3rem 0.6rem;
  border-radius:6px;
}
.delBtn:hover {
  background:#7f1d1d;
}
</style>
</head>

<body>

<div class="box">
  <h2>Add Event</h2>

  <input id="title" placeholder="Title" />
  <input id="date" type="date" />
  <input id="start" placeholder="Start (18:00)" />
  <input id="end" placeholder="End (19:00)" />

  <select id="repeat">
    <option value="none">No repeat</option>
    <option value="weekly">Weekly</option>
  </select>

  <button id="addBtn">Add Event</button>
</div>

<div class="box">
  <h2>Events</h2>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884",
  storageBucket: "ltc-website-8a884.appspot.com",
  messagingSenderId: "1059988013295",
  appId: "1:1059988013295:web:505d59225c70675247db1a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ===================== ADD EVENT =====================
document.getElementById("addBtn").onclick = async () => {

  const title = document.getElementById("title").value.trim();
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const repeat = document.getElementById("repeat").value;

  if (!title || !date) {
    alert("Fill title and date");
    return;
  }

  await addDoc(collection(db, "events"), {
    title,
    date,
    start,
    end,
    repeat
  });

  document.getElementById("title").value = "";
  document.getElementById("date").value = "";
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";

  loadEvents();
};


// ===================== FORMAT DATE =====================
function formatDate(d) {
  return new Date(d).toLocaleDateString("en-US", {
    weekday:"long",
    month:"long",
    day:"numeric",
    year:"numeric"
  });
}


// ===================== LOAD EVENTS =====================
async function loadEvents() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "events"));

  const grouped = {};

  snap.forEach(docSnap => {

    const ev = {
      id: docSnap.id,
      ...docSnap.data()
    };

    const key = ev.title || "Untitled";

    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(ev);
  });

  Object.keys(grouped).forEach(title => {

    const box = document.createElement("div");
    box.innerHTML = `<h3>${title}</h3>`;

    grouped[title].forEach(ev => {

      const row = document.createElement("div");
      row.className = "event";

      row.innerHTML = `
        <div>
          <b>${formatDate(ev.date)}</b><br/>
          <small>${ev.start || ""} - ${ev.end || ""}</small>
          ${ev.repeat === "weekly" ? " 🔁" : ""}
        </div>

        <button class="delBtn" data-id="${ev.id}">
          Delete
        </button>
      `;

      box.appendChild(row);
    });

    list.appendChild(box);
  });
}


// ===================== DELETE =====================
document.addEventListener("click", async (e) => {

  if (!e.target.classList.contains("delBtn")) return;

  const id = e.target.dataset.id;

  if (!confirm("Delete event?")) return;

  await deleteDoc(doc(db, "events", id));

  loadEvents();
});


// initial load
loadEvents();

</script>

</body>
</html>
