<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Calendar</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet" />

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.box {
  max-width:750px;
  margin:0 auto 2rem;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:translateY(-1px);
  background:#166534;
}

summary {
  cursor:pointer;
  font-weight:600;
  margin:0.5rem 0;
}

.event {
  padding:0.5rem 0;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}
small { color:#6b7280; }
</style>
</head>

<body>

<div class="box">
  <h2>Add Event</h2>

  <input id="title" placeholder="Title" />
  <input id="date" type="date" />
  <input id="start" placeholder="Start (18:00)" />
  <input id="end" placeholder="End (19:00)" />

  <select id="repeat">
    <option value="none">No repeat</option>
    <option value="weekly">Weekly</option>
  </select>

  <div id="repeatBox" style="display:none; margin-top:1rem;">
    <label>Repeat Days:</label><br/>

    <label><input type="checkbox" class="day" value="1"> Mon</label>
    <label><input type="checkbox" class="day" value="2"> Tue</label>
    <label><input type="checkbox" class="day" value="3"> Wed</label>
    <label><input type="checkbox" class="day" value="4"> Thu</label>
    <label><input type="checkbox" class="day" value="5"> Fri</label>
    <label><input type="checkbox" class="day" value="6"> Sat</label>
    <label><input type="checkbox" class="day" value="0"> Sun</label>

    <br/><br/>
    <label>Repeat Until:</label>
    <input type="date" id="until" />
  </div>

  <button id="addBtn">Add Event</button>
</div>

<div class="box">
  <h2>Events</h2>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884",
  storageBucket: "ltc-website-8a884.appspot.com",
  messagingSenderId: "1059988013295",
  appId: "1:1059988013295:web:505d59225c70675247db1a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (user) loadEvents();
  else alert("Not logged in");
});

// repeat toggle
document.getElementById("repeat").onchange = (e) => {
  document.getElementById("repeatBox").style.display =
    e.target.value === "weekly" ? "block" : "none";
};

// ADD EVENT
document.getElementById("addBtn").onclick = async () => {
  try {
    const user = auth.currentUser;
    if (!user) return alert("Not logged in");

    const title = document.getElementById("title").value;
    const date = document.getElementById("date").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const repeat = document.getElementById("repeat").value;

    const days = [...document.querySelectorAll(".day:checked")]
      .map(d => Number(d.value));

    const until = document.getElementById("until").value;

    await addDoc(collection(db, "events"), {
      title,
      date,
      start,
      end,
      repeat,
      repeatDays: days,
      repeatUntil: until
    });

    loadEvents();

  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};

// FORMAT DATE
function formatDate(d) {
  if (!d) return "";
  return new Date(d).toLocaleDateString("en-US", {
    weekday:"long",
    month:"long",
    day:"numeric",
    year:"numeric"
  });
}

// LOAD EVENTS
async function loadEvents() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "events"));

  const grouped = {};

  snap.forEach(docSnap => {
    const ev = docSnap.data();
    const key = ev.title || "Untitled Event";

    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(ev);
  });

  Object.keys(grouped).forEach(title => {

    const details = document.createElement("details");
    const summary = document.createElement("summary");

    summary.textContent = title;
    details.appendChild(summary);

    grouped[title].forEach(ev => {

      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = `
        <div>
          <b>${formatDate(ev.date)}</b><br/>
          <small>${ev.start || ""} - ${ev.end || ""}</small>
          ${ev.repeat === "weekly" ? " 🔁" : ""}
        </div>
      `;

      details.appendChild(div);
    });

    list.appendChild(details);
  });
}

</script>

</body>
</html>
