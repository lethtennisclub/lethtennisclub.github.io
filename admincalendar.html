<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Calendar</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet" />

<style>
body {
  font-family: 'EB Garamond', serif;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.hidden { display:none; }

.box {
  max-width:600px;
  margin:0 auto 2rem;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#166534; }

.event {
  display:flex;
  justify-content:space-between;
  padding:0.5rem 0;
  border-bottom:1px solid #eee;
}

.event button {
  background:#b91c1c;
  width:auto;
  padding:0.2rem 0.6rem;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="loginBtn">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- ADMIN -->
<div id="adminBox" class="hidden">

  <h1 style="text-align:center;">Calendar Admin</h1>

  <div class="box">
    <h3>Add Event</h3>

    <input id="title" placeholder="Title" />
    <input id="date" type="date" />
    <input id="start" placeholder="Start (18:00)" />
    <input id="end" placeholder="End (19:00)" />

    <select id="repeat">
      <option value="none">No repeat</option>
      <option value="weekly">Weekly</option>
    </select>

    <button id="addBtn">Add Event</button>
  </div>

  <div class="box">
    <h3>Events</h3>
    <div id="list"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884",
  storageBucket: "ltc-website-8a884.appspot.com",
  messagingSenderId: "1059988013295",
  appId: "1:1059988013295:web:505d59225c70675247db1a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// DOM
const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");

// ===== LOGIN =====
document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );
  } catch (e) {
    document.getElementById("error").innerText = e.message;
  }
};

// ===== AUTH FLOW (КАК В ТВОЕЙ РАБОЧЕЙ АДМИНКЕ) =====
onAuthStateChanged(auth, (user) => {

  if (user) {
    loginBox.style.display = "none";
    adminBox.classList.remove("hidden");

    // ВАЖНО: грузим только после login
    loadEvents();

  } else {
    loginBox.style.display = "block";
    adminBox.classList.add("hidden");
  }
});

// ===== ADD EVENT =====
document.getElementById("addBtn").onclick = async () => {

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const repeat = document.getElementById("repeat").value;

  if (!title || !date) return alert("Fill required fields");

  await addDoc(collection(db, "events"), {
    title,
    date,
    start,
    end,
    repeat
  });

  loadEvents();
};

// ===== LOAD EVENTS =====
async function loadEvents() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "events"));

  if (snap.empty) {
    list.innerHTML = "<p>No events</p>";
    return;
  }

  const grouped = {};

  snap.forEach(d => {
    const ev = d.data();
    if (!grouped[ev.title]) grouped[ev.title] = [];
    grouped[ev.title].push({ id: d.id, ...ev });
  });

  Object.keys(grouped).forEach(title => {
    const block = document.createElement("div");
    block.innerHTML = `<h4>${title}</h4>`;

    grouped[title].forEach(ev => {
      const row = document.createElement("div");
      row.className = "event";

      row.innerHTML = `
        <div>${ev.date} | ${ev.start}-${ev.end} ${ev.repeat === "weekly" ? "🔁" : ""}</div>
        <button onclick="del('${ev.id}')">X</button>
      `;

      block.appendChild(row);
    });

    list.appendChild(block);
  });
}

// ===== DELETE =====
window.del = async (id) => {
  await deleteDoc(doc(db, "events", id));
  loadEvents();
};

</script>

</body>
</html>
