<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Calendar</title>

<style>
body {
  font-family: system-ui;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.box {
  max-width:800px;
  margin:auto;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  margin-bottom:2rem;
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#166534; }

.event {
  display:flex;
  justify-content:space-between;
  padding:0.5rem 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.delBtn {
  width:auto;
  background:#b91c1c;
  padding:0.3rem 0.6rem;
}

.delBtn:hover { background:#7f1d1d; }

details {
  margin-bottom:1rem;
}

summary {
  cursor:pointer;
  font-weight:600;
}

small { color:#6b7280; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="box">
  <h2>Add Event</h2>

  <input id="title" placeholder="Title" />
  <input id="date" type="date" />

  <!-- HOURS ONLY -->
  <label>Start hour</label>
  <select id="startHour"></select>

  <label>End hour</label>
  <select id="endHour"></select>

  <select id="repeat">
    <option value="none">No repeat</option>
    <option value="weekly">Weekly</option>
  </select>

  <!-- WEEKLY OPTIONS -->
  <details id="weeklyBox">
    <summary>Weekly settings</summary>

    <div>
      <label><input type="checkbox" class="day" value="1"> Mon</label>
      <label><input type="checkbox" class="day" value="2"> Tue</label>
      <label><input type="checkbox" class="day" value="3"> Wed</label>
      <label><input type="checkbox" class="day" value="4"> Thu</label>
      <label><input type="checkbox" class="day" value="5"> Fri</label>
      <label><input type="checkbox" class="day" value="6"> Sat</label>
      <label><input type="checkbox" class="day" value="0"> Sun</label>
    </div>

    <br/>

    <label>Repeat end date</label>
    <input type="date" id="repeatEnd" />
  </details>

  <button id="addBtn">Add Event</button>
  <button id="deleteAll" style="margin-top:1rem;background:#7f1d1d;">
    Delete ALL
  </button>
</div>

<div class="box">
  <h2>Events</h2>
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== HOURS DROPDOWN (8–23) =====
const startHour = document.getElementById("startHour");
const endHour = document.getElementById("endHour");

for (let h = 8; h <= 23; h++) {
  const opt1 = new Option(`${h}:00`, `${h}:00`);
  const opt2 = new Option(`${h}:00`, `${h}:00`);
  startHour.add(opt1);
  endHour.add(opt2);
}

// ===== WEEKLY TOGGLE =====
document.getElementById("repeat").onchange = (e) => {
  document.getElementById("weeklyBox").open = e.target.value === "weekly";
};

// ===== ADD EVENT =====
document.getElementById("addBtn").onclick = async () => {

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;

  const startHourVal = startHour.value;
  const endHourVal = endHour.value;

  const repeat = document.getElementById("repeat").value;

  const days = [...document.querySelectorAll(".day:checked")]
    .map(d => Number(d.value));

  const repeatEnd = document.getElementById("repeatEnd").value;

  await addDoc(collection(db, "events"), {
    title,
    start: `${date}T${startHourVal}:00`,
    end: `${date}T${endHourVal}:00`,
    recurrence: repeat === "weekly"
      ? {
          weekly: true,
          days,
          repeatEnd
        }
      : null
  });

  loadEvents();
};

// ===== LOAD EVENTS =====
async function loadEvents() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const snap = await getDocs(collection(db, "events"));

  const grouped = {};

  snap.forEach(d => {
    const ev = { id: d.id, ...d.data() };
    if (!grouped[ev.title]) grouped[ev.title] = [];
    grouped[ev.title].push(ev);
  });

  Object.entries(grouped).forEach(([title, events]) => {

    const details = document.createElement("details");
    details.open = false;

    details.innerHTML = `<summary>${title}</summary>`;

    events.forEach(ev => {

      const row = document.createElement("div");
      row.className = "event";

      row.innerHTML = `
        <div>
          <b>${new Date(ev.start).toDateString()}</b><br/>
          <small>${ev.start.slice(11,16)} - ${ev.end.slice(11,16)}</small>
        </div>

        <button class="delBtn" data-id="${ev.id}">
          Delete
        </button>
      `;

      details.appendChild(row);
    });

    list.appendChild(details);
  });
}

// ===== DELETE =====
document.addEventListener("click", async (e) => {
  if (!e.target.classList.contains("delBtn")) return;

  const id = e.target.dataset.id;

  await deleteDoc(doc(db, "events", id));
  loadEvents();
});

// ===== DELETE ALL =====
document.getElementById("deleteAll").onclick = async () => {
  const snap = await getDocs(collection(db, "events"));

  for (let d of snap.docs) {
    await deleteDoc(doc(db, "events", d.id));
  }

  loadEvents();
};

loadEvents();

</script>
</body>
</html>
