<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Calendar</title>

<style>
body {
  font-family: system-ui;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.box {
  max-width:800px;
  margin:auto;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  margin-bottom:2rem;
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#166534; }

.row {
  display:flex;
  gap:10px;
}

.row > select {
  flex:1;
}

.event {
  display:flex;
  justify-content:space-between;
  padding:0.5rem 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.delBtn {
  width:auto;
  background:#b91c1c;
  padding:0.3rem 0.6rem;
}
.delBtn:hover { background:#7f1d1d; }

details { margin-bottom:1rem; }
summary { cursor:pointer; font-weight:600; }

small { color:#6b7280; }

#repeatBox {
  display:none;
  margin-top:1rem;
}
</style>
</head>

<body>

<div class="box">
  <h2>Add Event</h2>

  <input id="title" placeholder="Title" />
  <input id="date" type="date" />

  <div class="row">
    <select id="start"></select>
    <select id="end"></select>
  </div>

  <select id="repeat">
    <option value="none">No repeat</option>
    <option value="weekly">Weekly</option>
  </select>

  <div id="repeatBox">

    <p><b>Repeat days:</b></p>

    <label><input type="checkbox" value="1" class="day"> Mon</label>
    <label><input type="checkbox" value="2" class="day"> Tue</label>
    <label><input type="checkbox" value="3" class="day"> Wed</label>
    <label><input type="checkbox" value="4" class="day"> Thu</label>
    <label><input type="checkbox" value="5" class="day"> Fri</label>
    <label><input type="checkbox" value="6" class="day"> Sat</label>
    <label><input type="checkbox" value="0" class="day"> Sun</label>

    <br><br>

    <label>Repeat end date</label>
    <input type="date" id="repeatEnd" />

  </div>

  <button id="addBtn">Add Event</button>

  <button id="deleteAll" style="margin-top:1rem;background:#7f1d1d;">
    Delete ALL
  </button>
</div>

<div class="box">
  <h2>Events</h2>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== TIME OPTIONS =====
function fillTimes() {
  const start = document.getElementById("start");
  const end = document.getElementById("end");

  for (let h = 8; h <= 23; h++) {
    const t = `${String(h).padStart(2,'0')}:00`;
    start.innerHTML += `<option value="${t}">${t}</option>`;
    end.innerHTML += `<option value="${t}">${t}</option>`;
  }
}
fillTimes();

// ===== REPEAT UI =====
document.getElementById("repeat").onchange = (e) => {
  document.getElementById("repeatBox").style.display =
    e.target.value === "weekly" ? "block" : "none";
};

// ===== ADD EVENT =====
document.getElementById("addBtn").onclick = async () => {

  const title = document.getElementById("title").value.trim();
  const dateVal = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const repeat = document.getElementById("repeat").value;

  // validation
  if (!title || !dateVal || !start || !end) {
    alert("Fill all fields");
    return;
  }

  const days = [...document.querySelectorAll(".day:checked")]
    .map(d => Number(d.value));

  const repeatEnd = document.getElementById("repeatEnd").value;

  const startISO = `${dateVal}T${start}:00`;
  const endISO = `${dateVal}T${end}:00`;

  try {
    await addDoc(collection(db,"events"), {
      title,
      start: startISO,
      end: endISO,
      recurrence: {
        weekly: repeat === "weekly",
        days,
        repeatEnd,
        repeatStart: dateVal
      }
    });

    loadEvents();

  } catch (e) {
    console.error(e);
    alert("Error adding event");
  }
};

// ===== LOAD EVENTS =====
async function loadEvents() {

  const snap = await getDocs(collection(db,"events"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  const grouped = {};

  snap.forEach(d => {
    const ev = { id: d.id, ...d.data() };

    if (!grouped[ev.title]) grouped[ev.title] = [];
    grouped[ev.title].push(ev);
  });

  Object.entries(grouped).forEach(([title, events]) => {

    const details = document.createElement("details");
    details.innerHTML = `<summary>${title}</summary>`;

    events.forEach(ev => {

      const row = document.createElement("div");
      row.className = "event";

      row.innerHTML = `
        <div>
          ${new Date(ev.start).toDateString()}<br/>
          <small>${ev.start.slice(11,16)} - ${ev.end.slice(11,16)}</small>
          ${ev.recurrence?.weekly ? " 🔁" : ""}
        </div>

        <button class="delBtn" data-id="${ev.id}">Delete</button>
      `;

      details.appendChild(row);
    });

    list.appendChild(details);
  });
}

// ===== DELETE =====
document.addEventListener("click", async (e) => {
  if (!e.target.classList.contains("delBtn")) return;

  await deleteDoc(doc(db,"events", e.target.dataset.id));
  loadEvents();
});

// ===== DELETE ALL =====
document.getElementById("deleteAll").onclick = async () => {
  const snap = await getDocs(collection(db,"events"));

  for (let d of snap.docs) {
    await deleteDoc(doc(db,"events", d.id));
  }

  loadEvents();
};

loadEvents();

</script>

</body>
</html>
