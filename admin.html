<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel | LTC Tennis Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Lora', serif; padding: 2rem; background: #f4f9f0; }

    /* LOGIN */
    #login-container {
      max-width: 300px;
      margin: 5rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
    }

    #admin-content { display: none; }

    .admin-forms-container {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .blog-form-container, .tournament-form-container {
      flex: 1 1 45%;
      min-width: 300px;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
    }

    button {
      margin-top: 1rem;
      background: #14532d;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-container">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button id="login-btn">Login</button>
</div>

<!-- ADMIN (СКРЫТ) -->
<div id="admin-content">

  <h1>Admin Panel</h1>

  <div class="admin-forms-container">

    <div class="blog-form-container">
      <h2>Blog Posts</h2>
      <form id="post-form">
        <input type="text" id="title" placeholder="Title" required />
        <textarea id="content" placeholder="Content" required></textarea>
        <button type="submit">Add Post</button>
      </form>
      <div id="posts-container"></div>
    </div>

    <div class="tournament-form-container">
      <h2>Edit Tournament</h2>
      <form id="tournament-form">
        <input type="text" id="t-name" placeholder="Name" required />
        <input type="date" id="t-start" required />
        <input type="date" id="t-end" required />
        <input type="date" id="t-deadline" required />
        <button type="submit">Save</button>
      </form>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  getDocs, doc, deleteDoc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
document.getElementById('login-btn').onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    alert("Login error: " + e.message);
  }
};

/* CHECK AUTH */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    loadPosts();
    loadTournament();
  } else {
    document.getElementById('login-container').style.display = 'block';
    document.getElementById('admin-content').style.display = 'none';
  }
});

/* BLOG */
const postForm = document.getElementById('post-form');
const postsContainer = document.getElementById('posts-container');

postForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  await addDoc(collection(db, 'blogPosts'), {
    title: title.value,
    content: content.value,
    createdAt: serverTimestamp()
  });

  postForm.reset();
  loadPosts();
});

async function loadPosts() {
  postsContainer.innerHTML = '';
  const snapshot = await getDocs(collection(db, 'blogPosts'));

  snapshot.forEach(docSnap => {
    const post = docSnap.data();
    const div = document.createElement('div');

    div.innerHTML = `
      <h4>${post.title}</h4>
      <p>${post.content}</p>
      <button onclick="deletePost('${docSnap.id}')">Delete</button>
    `;

    postsContainer.appendChild(div);
  });
}

window.deletePost = async (id) => {
  await deleteDoc(doc(db, 'blogPosts', id));
  loadPosts();
};

/* TOURNAMENT */
const tournamentForm = document.getElementById('tournament-form');

async function loadTournament() {
  const docSnap = await getDoc(doc(db, "tournaments", "nextTournament"));
  if (docSnap.exists()) {
    const d = docSnap.data();
    t-name.value = d.name || '';
  }
}

tournamentForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  await setDoc(doc(db, "tournaments", "nextTournament"), {
    name: document.getElementById('t-name').value
  }, { merge: true });

  alert('Saved');
});
</script>

</body>
</html>
