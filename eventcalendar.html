<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin Calendar</title>

<style>
body {
  font-family: system-ui;
  background:#f0fdf4;
  padding:2rem;
  color:#14532d;
}

.box {
  max-width:800px;
  margin:0 auto 2rem;
  background:white;
  padding:2rem;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.row {
  display:flex;
  gap:10px;
}

input, select, button {
  width:100%;
  padding:0.6rem;
  margin-top:0.5rem;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#15803d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#166534; }

details {
  margin-bottom:1rem;
  background:#f9fff9;
  padding:1rem;
  border-radius:10px;
}

.event {
  display:flex;
  justify-content:space-between;
  padding:0.4rem 0;
  border-bottom:1px solid #eee;
}

.delBtn {
  background:#b91c1c;
  width:auto;
  padding:0.3rem 0.6rem;
}
</style>
</head>

<body>

<div class="box">
  <h2>Add Event</h2>

  <input id="title" placeholder="Event title"/>

  <div class="row">
    <input type="date" id="date"/>
  </div>

  <div class="row">
    <input type="time" id="start"/>
    <input type="time" id="end"/>
  </div>

  <select id="repeat">
    <option value="none">No repeat</option>
    <option value="weekly">Weekly</option>
  </select>

  <button id="addBtn">Add Event</button>
</div>

<div class="box">
  <h2>Events</h2>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.3.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5iFrQ4uprmeVeJCyKMiTDXk2T_k1sv4I",
  authDomain: "ltc-website-8a884.firebaseapp.com",
  projectId: "ltc-website-8a884",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ADD EVENT =================
document.getElementById("addBtn").onclick = async () => {

  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const repeat = document.getElementById("repeat").value;

  if (!title || !date || !start || !end) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"events"), {
    title,
    start: `${date}T${start}:00`,
    end: `${date}T${end}:00`,
    repeat
  });

  loadEvents();
};

// ================= LOAD EVENTS =================
async function loadEvents() {

  const snap = await getDocs(collection(db,"events"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  const grouped = {};

  snap.forEach(d => {
    const ev = { id: d.id, ...d.data() };

    if (!grouped[ev.title]) grouped[ev.title] = [];
    grouped[ev.title].push(ev);
  });

  Object.entries(grouped).forEach(([title, items]) => {

    const details = document.createElement("details");
    details.open = true;

    const summary = document.createElement("summary");
    summary.textContent = title;

    details.appendChild(summary);

    items.forEach(ev => {

      const row = document.createElement("div");
      row.className = "event";

      row.innerHTML = `
        <div>
          ${new Date(ev.start).toLocaleString()} 
          ${ev.repeat === "weekly" ? " 🔁" : ""}
        </div>

        <button class="delBtn" data-id="${ev.id}">
          delete
        </button>
      `;

      details.appendChild(row);
    });

    list.appendChild(details);
  });
}

// ================= DELETE =================
document.addEventListener("click", async (e) => {
  if (!e.target.classList.contains("delBtn")) return;

  const id = e.target.dataset.id;

  await deleteDoc(doc(db,"events",id));

  loadEvents();
});

loadEvents();

</script>

</body>
</html>
